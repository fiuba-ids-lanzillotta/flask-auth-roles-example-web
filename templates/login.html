{% extends "base.html" %}

{% block title %}Flask Auth Roles - Login{% endblock %}

{% block content %}

<section class="hero">
    <div class="hero__content">
        <h1 class="hero__title">Iniciar sesión</h1>
        <p class="hero__subtitle">Ingresá con tu email y password</p>
    </div>
</section>

<section class="search-section">
    <div class="search-card">
        <form action="{{ url_for('auth.login') }}" method="POST" class="form">
            <div class="form__group">
                <label for="email" class="form__label">Email</label>
                <input type="email" id="email" name="email" class="form__input"
                       placeholder="tu@email.com" required autofocus>
            </div>

            <div class="form__group">
                <label for="password" class="form__label">Password</label>
                <input type="password" id="password" name="password" class="form__input"
                       placeholder="Tu password" required>
            </div>

            <div class="form__actions form__actions--single">
                <button type="submit" class="form__btn form__btn--submit">Ingresar</button>
            </div>
        </form>

        <p class="search-card__subtitle" style="margin-top: 1rem;">
            ¿No tenés cuenta? <a href="{{ url_for('auth.register') }}" class="link">Registrate</a>
        </p>
    </div>
</section>

{% endblock %}
