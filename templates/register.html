{% extends "base.html" %}

{% block title %}Flask Auth Roles - Registro{% endblock %}

{% block content %}

<section class="hero">
    <div class="hero__content">
        <h1 class="hero__title">Crear cuenta</h1>
        <p class="hero__subtitle">Registrate como usuario para acceder al sistema</p>
    </div>
</section>

<section class="search-section">
    <div class="search-card">
        <form action="{{ url_for('auth.register') }}" method="POST" class="form">
            <div class="form__group">
                <label for="email" class="form__label">Email</label>
                <input type="email" id="email" name="email" class="form__input"
                       placeholder="tu@email.com" required autofocus>
            </div>

            <div class="form__group">
                <label for="nombre" class="form__label">Nombre</label>
                <input type="text" id="nombre" name="nombre" class="form__input"
                       placeholder="Tu nombre" required>
            </div>

            <div class="form__group">
                <label for="password" class="form__label">Password</label>
                <input type="password" id="password" name="password" class="form__input"
                       placeholder="Mínimo {{ password_min }} caracteres" required
                       minlength="{{ password_min }}" maxlength="{{ password_max }}">
            </div>

            <div class="form__actions form__actions--single">
                <button type="submit" class="form__btn form__btn--submit">Registrarme</button>
            </div>
        </form>

        <p class="search-card__subtitle" style="margin-top: 1rem;">
            ¿Ya tenés cuenta? <a href="{{ url_for('auth.login') }}" class="link">Iniciá sesión</a>
        </p>
    </div>
</section>

{% endblock %}
